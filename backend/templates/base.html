<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MERUEM{% endblock %}</title>
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="background-orbs">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-stack" id="flash-stack">
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}" style="transition: opacity 0.5s ease, transform 0.5s ease;">
                        <span>{{ message }}</span>
                        <button onclick="let el = this.parentElement; el.style.opacity='0'; setTimeout(() => el.remove(), 500);" style="background:none; border:none; color:inherit; font-weight:bold; cursor:pointer; margin-left:15px;">✕</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    
    {% block content %}{% endblock %}
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(function() {
                let flashMessages = document.querySelectorAll('.flash-message');
                flashMessages.forEach(function(msg) {
                    msg.style.opacity = "0";
                    msg.style.transform = "translateY(-10px)";
                    setTimeout(() => msg.remove(), 500); // Remove do DOM após a animação de meio segundo
                });
            }, 5000); // Começa a desaparecer após 5 segundos
        });
    </script>
</body>
</html>
