{% extends 'base.html' %}
{% block title %}MERUEM | Redefinir senha{% endblock %}
{% block content %}
<div class="single-card-wrap">
    <section class="glass-card auth-card narrow-card">
        <div class="brand-chip">Redefinir acesso</div>
        <h2>Esqueci minha senha</h2>
        <p class="section-copy">Para este MVP, a redefinição é feita pelo seu e-mail cadastrado. Em produção, o ideal é usar token por e-mail.</p>
        <form method="post" class="form-grid">
            <label>
                <span>E-mail da conta</span>
                <input type="email" name="email" required>
            </label>
            <label>
                <span>Nova senha</span>
                <input type="password" name="new_password" required>
            </label>
            <label>
                <span>Confirmar nova senha</span>
                <input type="password" name="confirm_password" required>
            </label>
            <button type="submit" class="primary-button">Salvar nova senha</button>
        </form>
        <a class="muted-link" href="{{ url_for('index') }}">Voltar para login</a>
    </section>
</div>
{% endblock %}
