{% extends 'base.html' %}
{% block title %}MERUEM | Redefinir senha{% endblock %}
{% block content %}
<div class="single-card-wrap">
    <section class="glass-card auth-card narrow-card">
        <div class="brand-chip">Recuperação Segura</div>
        <h2>Esqueci minha senha</h2>
        <p class="section-copy">Digite o e-mail associado à sua conta. Enviaremos um link mágico para você redefinir sua senha.</p>
        <form method="post" class="form-grid" style="grid-template-columns: 1fr;">
            <label>
                <span>E-mail da conta</span>
                <input type="email" name="email" placeholder="voce@email.com" required>
            </label>
            <button type="submit" class="primary-button full-width" style="margin-top: 10px;">Enviar link de recuperação</button>
        </form>
        <a class="muted-link" href="{{ url_for('home') }}" style="display: block; text-align: center; margin-top: 20px;">Voltar para o login</a>
    </section>
</div>
{% endblock %}
