{% extends 'base.html' %}
{% block title %}MERUEM | Nova Senha{% endblock %}
{% block content %}
<div class="single-card-wrap">
    <section class="glass-card auth-card narrow-card">
        <div class="brand-chip">Acesso Liberado</div>
        <h2>Criar nova senha</h2>
        <p class="section-copy">Crie uma senha forte (mínimo de 8 caracteres, com letras e números).</p>
        <form method="post" class="form-grid" style="grid-template-columns: 1fr;">
            <label>
                <span>Nova senha</span>
                <input type="password" name="new_password" required>
            </label>
            <label>
                <span>Confirmar nova senha</span>
                <input type="password" name="confirm_password" required>
            </label>
            <button type="submit" class="primary-button full-width" style="margin-top: 10px;">Salvar nova senha</button>
        </form>
    </section>
</div>
{% endblock %}
